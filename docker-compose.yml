name: scorecard-be

services:
  app:
    image: iblcloud/searle-scorecard-be:1.0.0
    container_name: searle-scorecard-be
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    ports:
      - "3014:3014"
    volumes:
      - ./logs:/app/logs
